# Development Profile Configuration

# This profile enables more verbose logging for easier debugging.
logging:
  level:
    com.nanogate: DEBUG # Enable detailed logging for all our application packages

# Development-specific routing configuration
nanogate:
  security:
    ip-sets:
      - name: internal-only
        type: ALLOW
        ips:
          - "127.0.0.1"
          - "10.0.0.0/8"
          - "192.168.0.0/16"
      - name: block-bad-actors
        type: BLOCK
        ips:
          - "203.0.113.50"
          - "198.51.100.0/24"
  routing:
    # Define backend sets for local development (e.g., pointing to localhost)
    backend-sets:
      - name: user-service-backend
        load-balancer: ROUND_ROBIN
        servers:
          - http://localhost:8081 # Healthy
          - http://localhost:8082 # Healthy
          - http://localhost:8083 # Intentionally Unhealthy
        http-client:
          connectTimeout: 8s # Override global default
        health-check:
          path: /health
          interval: 10s
          timeout: 2s
        resilience:
          # More aggressive settings for development and testing
          failureRateThreshold: 50.0
          slidingWindowSize: 10
          minimumNumberOfCalls: 5
          waitDurationInOpenState: 10s
        rate-limit:
          requestsPerSecond: 10 # Default backend limit
          resolver: "IP"

      - name: order-service-backend
        load-balancer: ROUND_ROBIN
        servers:
          - http://localhost:9090

    # Define routes for development
    routes:
      - id: user-report-route
        path: /api/users/reports/**
        backend-set: user-service-backend
        http-client:
          responseTimeout: 60s # Specific override for this slow route

      - id: rewrite-route
        path: /api/users/**
        backend-set: user-service-backend
        stripPrefix: 1
        rewritePath: "/users/(?<id>.*)"
        rewriteReplacement: "/user/fetch?id=${id}"
        requestHeaders:
          add:
            X-Downstream-Trace-Id: "nanogate-{header.X-Request-Id}"

      - id: order-service-route
        path: /api/orders/**
        backend-set: order-service-backend
        
      - id: header-transform-route
        path: /api/headers/**
        backend-set: user-service-backend
        requestHeaders:
          add:
            X-Gateway-Source: "NanoGate"
          remove:
            - "X-Internal-Debug"
        responseHeaders:
          add:
            X-Content-Source: "Backend"
          remove:
            - "X-Powered-By"

      - id: internal-admin-route
        path: /api/admin/**
        backend-set: user-service-backend
        ip-set: internal-only
      
      - id: public-user-route
        path: /api/public/**
        backend-set: user-service-backend
        ip-set: block-bad-actors
        rate-limit:
          requestsPerSecond: 2 # Strict override for this public route
          resolver: "HEADER"
          resolverArg: "X-API-Key"
        cors:
          enabled: true
          allowedOrigins:
            - "http://localhost:3000"
          allowedMethods:
            - "GET"
            - "POST"
            - "OPTIONS"
          allowCredentials: true
