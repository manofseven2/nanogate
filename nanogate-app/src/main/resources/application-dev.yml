# Development Profile Configuration

# This profile enables more verbose logging for easier debugging.
logging:
  level:
    com.nanogate: DEBUG # Enable detailed logging for all our application packages

# Development-specific routing configuration
nanogate:
  routing:
    # Define backend sets for local development (e.g., pointing to localhost)
    backend-sets:
      - name: user-service-backend
        load-balancer: ROUND_ROBIN
        servers:
          - http://localhost:8081 # Healthy
          - http://localhost:8082 # Healthy
          - http://localhost:8083 # Intentionally Unhealthy
        http-client:
          connectTimeout: 8s # Override global default
        health-check:
          path: /health
          interval: 10s
          timeout: 2s
        resilience:
          # More aggressive settings for development and testing
          failureRateThreshold: 50.0
          slidingWindowSize: 10
          minimumNumberOfCalls: 5
          waitDurationInOpenState: 10s

      - name: order-service-backend
        load-balancer: ROUND_ROBIN
        servers:
          - http://localhost:9090

    # Define routes for development
    routes:
      - id: user-report-route
        path: /api/users/reports/**
        backend-set: user-service-backend
        http-client:
          responseTimeout: 60s # Specific override for this slow route

      - id: user-profile-route
        path: /api/users/**
        backend-set: user-service-backend

      - id: order-service-route
        path: /api/orders/**
        backend-set: order-service-backend
        
      - id: header-transform-route
        path: /api/headers/**
        backend-set: user-service-backend
        requestHeaders:
          add:
            X-Gateway-Source: "NanoGate"
          remove:
            - "X-Internal-Debug"
        responseHeaders:
          add:
            X-Content-Source: "Backend"
          remove:
            - "X-Powered-By"
