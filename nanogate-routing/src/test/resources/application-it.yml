nanogate:
  routing:
    enabled: true
    default-http-client:
      connect-timeout: 2s
      response-timeout: 5s
    default-health-check:
      path: /health
      interval: 1s # Check frequently for tests
      timeout: 500ms
    backend-sets:
      - name: test-backend-1
        load-balancer: ROUND_ROBIN
        servers:
          - "http://localhost:8081"
      - name: test-backend-2
        load-balancer: ROUND_ROBIN
        servers:
          - "http://localhost:8082"
          - "http://localhost:8083"
        resilience:
          failureRateThreshold: 50.0
          slidingWindowSize: 10
          minimumNumberOfCalls: 5
          waitDurationInOpenState: 10s
      - name: slow-backend
        servers:
          - "http://localhost:8084"
      - name: least-connections-backend
        load-balancer: LEAST_CONNECTIONS
        servers:
          - "http://localhost:8085"
          - "http://localhost:8086"
      - name: health-check-backend
        load-balancer: ROUND_ROBIN
        servers:
          - "http://localhost:8088"
          - "http://localhost:8089"
        health-check:
          path: /specific-health
          interval: 1s
          timeout: 500ms
      - name: streaming-backend
        servers:
          - "http://localhost:8090"
      - name: large-payload-backend
        servers:
          - "http://localhost:8091"
    routes:
      - id: exact-route
        path: "/api/exact"
        backend-set: test-backend-1
      - id: load-balanced-route
        path: "/api/lb/**"
        backend-set: test-backend-2
      - id: fast-timeout-route
        path: "/api/slow"
        backend-set: slow-backend
        http-client:
          response-timeout: 100ms
      - id: least-connections-route
        path: "/api/lc/**"
        backend-set: least-connections-backend
      - id: health-check-route
        path: "/api/health-test/**"
        backend-set: health-check-backend
      - id: header-transform-route
        path: "/api/headers/**"
        backend-set: test-backend-1
        requestHeaders:
          add:
            X-Gateway-Source: "NanoGate"
          remove:
            - "X-Internal-Debug"
        responseHeaders:
          add:
            X-Content-Source: "Backend"
          remove:
            - "X-Powered-By"
      - id: rewrite-route
        path: /api/users/**
        backend-set: test-backend-1
        stripPrefix: 1
        rewritePath: "/users/(?<id>.*)"
        rewriteReplacement: "/user/fetch?id=${id}"
        requestHeaders:
          add:
            X-Downstream-Trace-Id: "nanogate-{header.X-Request-Id}"
      - id: streaming-route
        path: "/api/streaming/**"
        backend-set: streaming-backend
      - id: large-post-route
        path: "/api/large-post/**"
        backend-set: large-payload-backend
